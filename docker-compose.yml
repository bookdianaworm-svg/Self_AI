version: '3.8'

services:
  self-ai:
    build: .
    ports:
      - "8000:8000"
      - "8765:8765"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - DEFAULT_BACKEND=openai
      - ENVIRONMENT=docker
      - LOG_LEVEL=INFO
      - ENABLE_KEY_ENCRYPTION=true
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://self-ai:8000
    depends_on:
      - self-ai
    restart: unless-stopped

volumes:
  redis_data:
